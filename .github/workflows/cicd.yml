name: Project API CI/CD

on:
  workflow_dispatch:
  push:

permissions:
  contents: read
  packages: write

jobs:
  APIs-cicd:
    uses: mairie360/CICD/.github/workflows/APIs_cicd.yml@v1.4.8
    permissions:
          contents: write
          packages: write
          id-token: write
    with:
      postman_collection: ${{ vars.POSTMAN_PROJECT_API_COLLECTION_ID }}
      postman_environment: ${{ vars.POSTMAN_PROJECT_API_ENV_ID }}
      package_name: project-api
      cicd_version: v1.2.4
    secrets: inherit
